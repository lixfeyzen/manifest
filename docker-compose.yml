services:
  postgres:
    image: postgres:16-alpine
    container_name: manifest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: manifest
      POSTGRES_PASSWORD: manifest
      POSTGRES_DB: manifest
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - manifest-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manifest -d manifest"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: manifest-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - manifest-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  manifest-pgdata:
  manifest-redisdata:
