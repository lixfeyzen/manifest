name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: manifest
          POSTGRES_PASSWORD: manifest
          POSTGRES_DB: manifest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U manifest -d manifest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://manifest:manifest@localhost:5432/manifest?schema=public
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Create test database
        run: PGPASSWORD=manifest psql -h localhost -U manifest -d manifest -c "CREATE DATABASE manifest_test"

      - name: Prepare test env
        run: cp .env.test.example .env.test

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit + integration)
        run: pnpm test

      - name: Build
        run: pnpm build
